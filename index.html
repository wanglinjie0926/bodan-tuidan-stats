<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驳单退单统计分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.0/style/jsmind.css">
    <script src="https://cdn.jsdelivr.net/npm/jsmind@0.5.0/es6/jsmind.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #E6F3FF 0%, #F0F8FF 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 1440px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(24, 144, 255, 0.1);
            overflow: hidden;
        }

        /* 顶部Tab切换 */
        .top-tabs {
            display: flex;
            background: linear-gradient(135deg, rgba(230, 247, 255, 0.9) 0%, rgba(255, 255, 255, 0.9) 100%);
            border-bottom: 1px solid rgba(24, 144, 255, 0.15);
        }

        .tab {
            flex: 0 0 200px;
            height: 56px;
            line-height: 56px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #666666;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab:hover {
            color: #1890FF;
            background: rgba(24, 144, 255, 0.05);
        }

        .tab.active {
            color: #1890FF;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 248, 255, 0.9) 100%);
            border-bottom: 3px solid #1890FF;
        }

        .main-content {
            padding: 20px;
        }

        .sub-page {
            display: none;
        }

        .sub-page.active {
            display: block;
        }

        .sub-title {
            font-size: 20px;
            font-weight: 600;
            color: #1890FF;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .filter-bar {
            height: 60px;
            background: linear-gradient(135deg, rgba(230, 247, 255, 0.8) 0%, rgba(255, 255, 255, 0.9) 100%);
            border-radius: 12px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            border: 1px solid rgba(24, 144, 255, 0.15);
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.08);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .filter-input {
            height: 36px;
            border: 1px solid rgba(24, 144, 255, 0.2);
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            width: 220px;
            background-color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .filter-input:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }

        .filter-select {
            height: 36px;
            border: 1px solid rgba(24, 144, 255, 0.2);
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            width: 120px;
            background-color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }

        .btn {
            height: 36px;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-query {
            background: linear-gradient(135deg, #1890FF 0%, #40A9FF 100%);
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.25);
        }

        .btn-query:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.35);
        }

        .btn-export {
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F8FF 100%);
            color: #666666;
            border: 1px solid rgba(24, 144, 255, 0.2);
            margin-left: 8px;
        }

        .btn-export:hover {
            border-color: #1890FF;
            color: #1890FF;
            transform: translateY(-2px);
        }

        .content-wrapper {
            display: flex;
            gap: 16px;
        }

        .mindmap-area {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 248, 255, 0.95) 100%);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(24, 144, 255, 0.1);
            box-shadow: 0 4px 16px rgba(24, 144, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .module-title {
            font-size: 16px;
            font-weight: 600;
            color: #1890FF;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }

        /* jsMind 样式覆盖 */
        .jsmind-container {
            background-color: rgba(255, 255, 255, 0.7) !important;
            border-radius: 12px;
        }

        .jsmind-inner {
            background-color: transparent !important;
        }

        jmnode {
            border-radius: 6px !important;
        }

        .mindmap-container {
            width: 100%;
            height: 560px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.5);
        }

        .chart-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chart-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 248, 255, 0.95) 100%);
            border-radius: 16px;
            padding: 20px;
            height: 340px;
            border: 1px solid rgba(24, 144, 255, 0.1);
            box-shadow: 0 4px 16px rgba(24, 144, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .chart-container {
            width: 100%;
            height: 280px;
            border-radius: 8px;
        }

        @media (max-width: 1440px) {
            .container {
                width: 100%;
            }
        }

        /* 自定义浮窗样式 */
        .custom-tooltip {
            position: fixed;
            z-index: 9999;
            min-width: 220px;
            max-width: 320px;
            padding: 12px 16px;
            background: #FFFFFF;
            border: 1.5px solid #1890FF;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(24, 144, 255, 0.25);
            font-size: 13px;
            color: #333333;
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .custom-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }

        .custom-tooltip .tt-city {
            font-size: 15px;
            font-weight: 700;
            color: #1890FF;
            margin-bottom: 6px;
        }

        .custom-tooltip .tt-value {
            color: #333333;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #E0E0E0;
        }

        .custom-tooltip .tt-value strong {
            color: #1890FF;
            font-weight: 700;
            font-size: 14px;
            margin-left: 4px;
        }

        .custom-tooltip .tt-section {
            font-size: 11px;
            color: #999999;
            margin: 8px 0 4px 0;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .custom-tooltip .tt-dispatcher {
            display: flex;
            align-items: center;
            margin: 4px 0;
            font-size: 12.5px;
        }

        .custom-tooltip .tt-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #1890FF;
            color: #FFFFFF;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .custom-tooltip .tt-name {
            font-weight: 600;
            color: #333333;
            margin-right: 4px;
        }

        .custom-tooltip .tt-id {
            color: #999999;
            font-size: 12px;
        }

        .custom-tooltip .tt-count {
            margin-left: auto;
            color: #1890FF;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-tabs">
            <div class="tab active" data-page="reject">驳单统计</div>

        <div class="main-content">
            <!-- 驳单统计子页面 -->
            <div id="reject-page" class="sub-page active">
                <div class="sub-title">驳单统计分析</div>
                <div class="filter-bar">
                    <div class="filter-group">
                        <input type="text" id="date-range-reject" class="filter-input" value="2025-08-01 至 2025-08-30" placeholder="选择时间范围" readonly>
                        <select class="filter-select" id="city-select-reject">

                            <option>阿坝</option>

                            <option>成都</option>
                            <option>达州</option>
                            <option>德阳</option>
                            <option>甘孜</option>
                            <option>广安</option>
                            <option>广元</option>
                            <option>乐山</option>
                            <option>凉山</option>
                            <option>泸州</option>
                            <option>眉山</option>
                            <option>绵阳</option>
                            <option>南充</option>
                            <option>内江</option>
                            <option>攀枝花</option>
                            <option>遂宁</option>

            <!-- 退单统计子页面 -->
            <div id="return-page" class="sub-page">
                <div class="sub-title">退单统计分析</div>
                <div class="filter-bar">
                    <div class="filter-group">
                        <input type="text" id="date-range-return" class="filter-input" value="2025-08-01 至 2025-08-30" placeholder="选择时间范围" readonly>
                        <select class="filter-select" id="city-select-return">
                            <option selected>全省</option>
                            <option>阿坝</option>
                            <option>巴中</option>
                            <option>成都</option>
                            <option>达州</option>
                            <option>德阳</option>
                            <option>甘孜</option>
                            <option>广安</option>
                            <option>广元</option>
                            <option>乐山</option>
                            <option>凉山</option>
                            <option>泸州</option>
                            <option>眉山</option>
                            <option>绵阳</option>
                            <option>南充</option>
                            <option>内江</option>
                            <option>攀枝花</option>
                            <option>遂宁</option>
                            <option>天府新区</option>
                            <option>雅安</option>
                            <option>宜宾</option>
                            <option>资阳</option>
                            <option>自贡</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="btn btn-query">查询</button>
                        <button class="btn btn-export">导出</button>
                    </div>
                </div>

                <div class="content-wrapper">
                    <div class="mindmap-area">
                        <div class="module-title">
                            <span>退单思维导图</span>
                        </div>
                        <div id="mindmap-chart-return" class="mindmap-container"></div>
                    </div>

                    <div class="chart-area">
                        <div class="chart-card">
                            <div class="module-title">累计退单量排名</div>
                            <div id="bar-chart-return" class="chart-container"></div>
                        </div>

                        <div class="chart-card">
                            <div class="module-title">退单率环比</div>
                            <div id="line-chart-return" class="chart-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 当前激活的子页面
        let currentSubPage = 'reject';
        const chartInstances = {};
        // 保存 jsMind / KityMinder 实例用于销毁
        const mindmapInstances = { reject: null, return: null };

        // ========== 思维导图数据(来自MD文件) ==========

        // 驳单思维导图数据
        const rejectMindmapData = {
            name: '驳单',
            children: [
                {
                    name: '转派',
                    children: [
                        {
                            name: '组外转派',
                            children: [
                                { name: '工单地址错误,派发错误' },
                                { name: '工单地址正确,派发错误' },
                                { name: '他人支援(跨班组)' }
                            ]
                        },
                        {
                            name: '组内转派',
                            children: [
                                { name: '人员忙工单量饱和' },
                                { name: '人员请假' },
                                { name: '派发错误' },
                                { name: '地址错误' }
                            ]
                        }
                    ]
                },
                {
                    name: '重派',
                    children: [
                        {
                            name: '修改重派',
                            children: [
                                { name: '修改终端类型' },
                                { name: '电话错误,需重派' },
                                { name: '区县、地市派错' }
                            ]
                        },
                        {
                            name: '流转重派',
                            children: [
                                { name: '需重做网管数据、资源重分配' }
                            ]
                        }
                    ]
                }
            ]
        };

        // 退单思维导图数据
        const returnMindmapData = {
            name: '装机退单20%\n工单量:100\n退单量:20',
            children: [
                {
                    name: '用户原因',
                    children: [
                        { name: '明确表示不安装' },
                        { name: '短期内不安装' },
                        { name: '联系不上客户' },
                        { name: '走线等协调问题' },
                        { name: '终端遗失无法安装' },
                        { name: '无法完成实名制' },
                        { name: '需求变更' }
                    ]
                },
                {
                    name: '前台原因',
                    children: [
                        { name: '不知情开通' },
                        { name: '重复派单' },
                        { name: '业务办理错误' },
                        { name: '宣传与实际严重不符' }
                    ]
                },
                {
                    name: '网络原因',
                    children: [
                        { name: '户线不通且无法穿线' }
                    ]
                },
                {
                    name: '建设原因',
                    children: [
                        { name: '资源需扩建' },
                        { name: '资源需新建' }
                    ]
                }
            ]
        };

        // ========== Tab切换 ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                switchSubPage(page);
            });
        });

        function switchSubPage(page) {
            currentSubPage = page;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[data-page="${page}"]`).classList.add('active');
            const targetPage = document.getElementById(page + '-page');
            targetPage.classList.add('active');
            // 强制触发一次 reflow,让浏览器完成 display:none → block 的布局计算
            void targetPage.offsetHeight;
            // 等 50ms 让 ZRender 画布的 hit-test 区域建立,再初始化
            setTimeout(function() {
                initCharts(page);
                // 初始化后再 resize 一次,确保画布尺寸和事件坐标准确
                setTimeout(function() {
                    if (chartInstances[page]) {
                        if (chartInstances[page].bar) chartInstances[page].bar.resize();
                        if (chartInstances[page].line) chartInstances[page].line.resize();
                    }
                }, 50);
            }, 50);
        }

        // ========== 数据转换工具 ==========
        // 转换为 jsMind 格式
        function toJsMindData(rootData) {
            let idCounter = 0;
            function convert(node) {
                const id = 'n' + (idCounter++);
                const result = {
                    id: id,
                    topic: node.name.replace(/\n/g, '<br/>')
                };
                if (node.children && node.children.length > 0) {
                    result.children = node.children.map(convert);
                }
                return result;
            }
            return {
                meta: { name: 'mindmap', author: 'system', version: '1.0' },
                format: 'node_tree',
                data: convert(rootData)
            };
        }

        // ========== jsMind 思维导图渲染 ==========
        function renderMindmapWithJsMind(containerId, data) {
            const container = document.getElementById(containerId);
            const page = containerId.includes('reject') ? 'reject' : 'return';

            // 已存在实例,直接更新数据
            if (mindmapInstances[page] && typeof mindmapInstances[page].show === 'function') {
                try {
                    mindmapInstances[page].show(toJsMindData(data));
                    return;
                } catch (e) {
                    console.warn('jsMind show 失败,重建实例:', e);
                }
            }

            // 清空容器
            container.innerHTML = '';
            // 给容器本身加 jsmind-container 类(jsMind 直接使用此容器)
            container.classList.add('jsmind-container');

            try {
                const mindData = toJsMindData(data);
                const options = {
                    container: containerId,
                    editable: false,
                    theme: 'primary',
                    view: {
                        hmargin: 60,
                        vmargin: 30,
                        line_width: 2,
                        line_color: '#1890FF'
                    },
                    layout: {
                        hspace: 30,
                        vspace: 20,
                        pspace: 12
                    },
                    shortcut: {
                        enable: false
                    }
                };
                const instance = new jsMind(options);
                instance.show(mindData);
                mindmapInstances[page] = instance;
            } catch (e) {
                console.error('jsMind 渲染失败:', e);
                container.innerHTML = '<div style="padding:40px;text-align:center;color:#FF4D4F;">jsMind 渲染失败: ' + e.message + '<br/><br/>请检查控制台</div>';
            }
        }

        // ========== 思维导图统一渲染入口(仅 jsMind) ==========
        function renderMindmap(page) {
            const containerId = 'mindmap-chart-' + page;
            const data = page === 'reject' ? rejectMindmapData : returnMindmapData;
            renderMindmapWithJsMind(containerId, data);
        }

        // ========== 城市数据(参考原页面) ==========
        const cities = ['阿坝', '巴中', '成都', '达州', '德阳', '甘孜', '广安', '广元', '乐山', '凉山', '泸州', '眉山', '绵阳', '南充', '内江', '攀枝花', '遂宁', '天府新区', '雅安', '宜宾', '资阳', '自贡'];

        const barValues = [185, 242, 280, 195, 268, 178, 130, 168, 180, 155, 223, 150, 252, 160, 200, 145, 188, 175, 142, 140, 165, 135];

        const dateList = ['08-01', '08-02', '08-03', '08-04', '08-05', '08-06', '08-07', '08-08', '08-09', '08-10', '08-11', '08-12', '08-13', '08-14', '08-15', '08-16', '08-17', '08-18', '08-19', '08-20', '08-21', '08-22', '08-23', '08-24', '08-25', '08-26', '08-27', '08-28', '08-29', '08-30'];

        const lastMonthData = [40, 48, 45, 52, 38, 35, 45, 52, 58, 50, 45, 48, 42, 45, 50, 55, 52, 48, 45, 50, 45, 42, 48, 52, 58, 50, 45, 48, 42, 45];
        const thisMonthData = [45, 52, 48, 55, 42, 38, 50, 58, 62, 55, 48, 52, 45, 50, 55, 60, 58, 52, 48, 55, 50, 45, 52, 58, 62, 55, 48, 52, 45, 50];

        // ========== 图表初始化 ==========
        function initCharts(page) {
            if (chartInstances[page]) {
                if (chartInstances[page].bar) chartInstances[page].bar.dispose();
                if (chartInstances[page].line) chartInstances[page].line.dispose();
            }

            // 思维导图
            renderMindmap(page);

            // 各城市TOP5调度员详情映射
            const dispatcherMap = {
                '阿坝': '李明(111111)：25<br>王芳(222222)：18<br>张伟(333333)：15<br>刘洋(444444)：12<br>陈静(555555)：10',
                '巴中': '赵强(333333)：30<br>刘丽(444444)：22<br>孙涛(555555)：18<br>周敏(666666)：15<br>吴华(777777)：12',
                '成都': '张三(123456)：50<br>李四(654321)：40<br>王五(789012)：35<br>赵六(345678)：28<br>钱七(901234)：22',
                '达州': '陈伟(555555)：28<br>杨敏(666666)：20<br>黄勇(777777)：16<br>何静(888888)：14<br>马涛(999999)：11',
                '德阳': '黄涛(777777)：35<br>周静(888888)：25<br>吴刚(999999)：20<br>郑红(101010)：16<br>冯雪(202020)：13',
                '甘孜': '吴刚(999999)：20<br>徐红(101010)：15<br>孙亮(202020)：12<br>李娜(303030)：10<br>赵勇(404040)：8',
                '广安': '孙杰(2701004)：36<br>朱华(2701005)：30<br>林芳(2701006)：25<br>陈强(2701007)：20<br>杨敏(2701008)：15',
                '广元': '孙杰(111213)：32<br>朱华(141516)：24<br>胡强(171819)：20<br>郭敏(202122)：16<br>林涛(232425)：13',
                '乐山': '马超(2701010)：42<br>林芳(2701011)：36<br>郭强(2701012)：31<br>梁静(2701013)：25<br>宋伟(2701014)：20',
                '凉山': '马超(171819)：27<br>林芳(202122)：19<br>梁伟(232425)：16<br>宋静(262728)：13<br>唐雪(293031)：10',
                '泸州': '郭强(232425)：33<br>何静(262728)：23<br>罗刚(293031)：19<br>高敏(323334)：15<br>梁涛(353637)：12',
                '眉山': '罗伟(2701019)：38<br>谢敏(2701020)：32<br>唐涛(2701021)：27<br>冯红(2701022)：22<br>蒋强(2701023)：17',
                '绵阳': '王家强(2700986)：68<br>马靖宇(2700986)：52<br>吴霁兰(2700986)：41<br>张志远(2700986)：35<br>陈雪(2700986)：28',
                '南充': '罗伟(293031)：29<br>谢敏(323334)：21<br>唐强(353637)：18<br>冯红(383940)：14<br>蒋雪(414243)：11',
                '内江': '郑强(2701022)：37<br>王敏(2701023)：31<br>李涛(2701024)：26<br>张伟(2701025)：21<br>刘静(2701026)：16',
                '攀枝花': '唐涛(353637)：26<br>冯红(383940)：18<br>蒋强(414243)：15<br>沈静(444546)：12<br>韩华(474849)：9',
                '遂宁': '于刚(414243)：31<br>曹华(444546)：22<br>彭伟(474849)：18<br>曾敏(505152)：14<br>田涛(535455)：11',
                '天府新区': '魏敏(474849)：28<br>蒋强(505152)：20<br>贺红(535455)：16<br>段雪(565758)：13<br>雷勇(595961)：10',
                '雅安': '沈芳(535455)：25<br>韩伟(565758)：17<br>杨涛(595961)：14<br>朱雪(626364)：11<br>秦刚(656667)：9',
                '宜宾': '刘伟(2701025)：41<br>张芳(2701026)：35<br>陈静(2701027)：30<br>杨涛(2701028)：24<br>黄敏(2701029)：19',
                '资阳': '杨静(596061)：30<br>朱红(626364)：22<br>许华(656667)：18<br>邹敏(686970)：14<br>石涛(707172)：11',
                '自贡': '秦刚(656667)：27<br>许华(686970)：19<br>龚伟(707172)：16<br>严红(737475)：13<br>段华(767778)：10'
            };

            // 解析调度员字符串为结构化数据(按顺序自动分配排名 1~N)
            function parseDispatchers(str) {
                if (!str) return [];
                const regex = /([^\s(（][^()（）]*?)\s*[((]([^)）]+)[))]\s*[：:]\s*(\d+)/g;
                const result = [];
                let m;
                let i = 0;
                while ((m = regex.exec(str)) !== null) {
                    result.push({ rank: ++i, name: m[1].trim(), id: m[2], count: m[3] });
                }
                return result;
            }

            // 构造浮窗 HTML
            function buildTooltipHtml(city, value, dispatcherStr, valueLabel) {
                const dispatchers = parseDispatchers(dispatcherStr);
                let html = `<div class="tt-city">${city}</div>`;
                html += `<div class="tt-value">${valueLabel || '数量'}:<strong>${value}</strong></div>`;
                dispatchers.forEach(d => {
                    html += `<div class="tt-dispatcher">` +
                            `<span class="tt-rank">${d.rank}</span>` +
                            `<span class="tt-name">${d.name}</span>` +
                            `<span class="tt-id">(${d.id})</span>` +
                            `<span class="tt-count">${d.count}</span>` +
                            `</div>`;
                });
                return html;
            }

            // 显示/隐藏浮窗
            const tooltipEl = document.getElementById('customTooltip');
            let hideTimer = null;
            function showCustomTooltip(e, html) {
                if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
                tooltipEl.innerHTML = html;
                tooltipEl.classList.add('show');
                if (e) positionTooltip(e);
            }
            function hideCustomTooltip(delay) {
                if (hideTimer) clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    tooltipEl.classList.remove('show');
                }, delay || 0);
            }
            function positionTooltip(e) {
                const offset = 16;
                let x = e.clientX + offset;
                let y = e.clientY + offset;
                const rect = tooltipEl.getBoundingClientRect();
                if (x + rect.width > window.innerWidth - 8) {
                    x = e.clientX - rect.width - offset;
                }
                if (y + rect.height > window.innerHeight - 8) {
                    y = e.clientY - rect.height - offset;
                }
                tooltipEl.style.left = x + 'px';
                tooltipEl.style.top = y + 'px';
            }

            // 累计排名标签(驳单/退单)
            const valueLabel = page === 'reject' ? '调度量' : '退单量';

            // 柱状图(累计排名)
            const barChart = echarts.init(document.getElementById('bar-chart-' + page));
            const barOption = {
                tooltip: { show: false },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    top: '12%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: cities,
                    axisLabel: {
                        fontSize: 10,
                        color: '#666666',
                        rotate: 45,
                        interval: 0,
                        margin: 10
                    },
                    axisLine: { lineStyle: { color: '#E0E0E0' } },
                    axisTick: { show: false }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        fontSize: 11,
                        color: '#666666'
                    },
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: '#F0F0F0', type: 'dashed' } }
                },
                series: [{
                    data: barValues,
                    type: 'bar',
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#40A9FF' },
                            { offset: 1, color: '#1890FF' }
                        ]),
                        borderRadius: [4, 4, 0, 0]
                    },
                    barWidth: '60%',
                    emphasis: {
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#69C0FF' },
                                { offset: 1, color: '#1890FF' }
                            ])
                        }
                    }
                }]
            };
            barChart.setOption(barOption);

            // 绑定鼠标事件,显示自定义浮窗
            barChart.on('mouseover', { seriesType: 'bar' }, function(params) {
                const name = params.name;
                const value = params.value;
                const html = buildTooltipHtml(name, value, dispatcherMap[name], valueLabel);
                const nativeEvt = (params.event && params.event.event) || params.event;
                showCustomTooltip(nativeEvt, html);
            });
            barChart.on('mouseout', { seriesType: 'bar' }, function() {
                hideCustomTooltip(50);
            });
            barChart.getZr().on('mousemove', function(params) {
                if (!tooltipEl.classList.contains('show')) return;
                const e = params.event;
                if (!e) return;
                if (e.clientX !== undefined) {
                    positionTooltip(e);
                } else if (e.offsetX !== undefined) {
                    positionTooltip({ clientX: e.offsetX, clientY: e.offsetY });
                }
            });
            barChart.getZr().on('mouseout', function() {
                hideCustomTooltip(0);
            });

            // 折线图(环比)
            const lineChart = echarts.init(document.getElementById('line-chart-' + page));
            const isRate = page === 'return';
            const lineOption = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        let result = params[0].name + '<br/>';
                        params.forEach(function(item) {
                            const emoji = item.seriesName === '本月' ? '🟥' : '🔵';
                            const val = isRate ? item.value + '%' : item.value;
                            result += emoji + ' ' + item.seriesName + '：' + val + '<br/>';
                        });
                        return result;
                    }
                },
                legend: {
                    data: ['上月', '本月'],
                    top: '5%',
                    textStyle: {
                        fontSize: 12,
                        color: '#666666'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    top: '20%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: isRate ? cities : dateList,
                    axisLabel: {
                        fontSize: 10,
                        color: '#666666',
                        rotate: isRate ? 35 : 45,
                        interval: isRate ? 0 : 2
                    }
                },
                yAxis: {
                    type: 'value',
                    name: isRate ? '退单率(%)' : '调度量',
                    nameTextStyle: {
                        fontSize: 11,
                        color: '#666666',
                        padding: [0, 0, 0, 10]
                    },
                    axisLabel: {
                        fontSize: 11,
                        color: '#666666',
                        formatter: isRate ? '{value}%' : '{value}'
                    }
                },
                series: [
                    {
                        name: '上月',
                        data: isRate ? cities.map(function(c) { return generateCityRateData(c).lastMonth; }) : lastMonthData,
                        type: isRate ? 'bar' : 'line',
                        barWidth: isRate ? 10 : undefined,
                        barGap: '20%',
                        smooth: !isRate,
                        itemStyle: { color: isRate ? '#91D5FF' : '#1890FF' },
                        lineStyle: { width: 2 },
                        symbol: 'circle',
                        symbolSize: 8
                    },
                    {
                        name: '本月',
                        data: isRate ? cities.map(function(c) { return generateCityRateData(c).thisMonth; }) : thisMonthData,
                        type: isRate ? 'bar' : 'line',
                        barWidth: isRate ? 10 : undefined,
                        barGap: '20%',
                        smooth: !isRate,
                        itemStyle: { color: isRate ? '#FF7A45' : '#FF4D4F' },
                        lineStyle: { width: 2 },
                        symbol: 'rect',
                        symbolSize: 10
                    }
                ]
            };
            lineChart.setOption(lineOption);

            chartInstances[page] = { bar: barChart, line: lineChart };
        }

        // 窗口缩放
        window.addEventListener('resize', function() {
            if (chartInstances[currentSubPage]) {
                if (chartInstances[currentSubPage].bar) chartInstances[currentSubPage].bar.resize();
                if (chartInstances[currentSubPage].line) chartInstances[currentSubPage].line.resize();
            }
            // jsMind 自带响应式,无需手动重绘
        });

        // ========== 退单率环比:按地市生成折线数据 ==========
        // 基于该地市的累计退单量(barValue)反推日均退单率,叠加周期性波动
        function generateCityLineData(city) {
            const idx = cities.indexOf(city);
            const baseValue = barValues[idx] || 150;
            // 退单率基准 5%~28%,与 barValue 强相关(退单量越大基准越高)
            const baseRate = 5 + (baseValue / 280) * 23;
            const seed = (idx + 1) * 1.37;
            const phase1 = (idx * 0.7) % 6.28;
            const phase2 = (idx * 1.3) % 6.28;
            const lastMonth = [];
            const thisMonth = [];
            for (let i = 0; i < 30; i++) {
                // 上月:中等波动
                const last = baseRate + Math.sin(i * 0.42 + seed + phase1) * 3.5
                                  + ((i + idx) % 4 === 0 ? -2 : 1.2);
                // 本月:波动略大,趋势向上
                const cur = baseRate + 2.5
                                  + Math.sin(i * 0.38 + seed + phase2) * 4.2
                                  + Math.cos(i * 0.25 + seed) * 2
                                  + ((i + idx) % 5 === 0 ? 3 : -1);
                lastMonth.push(Number(last.toFixed(1)));
                thisMonth.push(Number(cur.toFixed(1)));
            }
            return { lastMonth, thisMonth };
        }

        // ========== 各城市退单率(单值,用于横坐标为地市的柱状对比) ==========
        function generateCityRateData(city) {
            const idx = cities.indexOf(city);
            const baseValue = barValues[idx] || 150;
            // 退单率基准 5%~28%,与 barValue 强相关
            const baseRate = 5 + (baseValue / 280) * 23;
            // 上月率
            const lastMonth = Number((baseRate + (idx % 3 === 0 ? -1.5 : 0.8)).toFixed(1));
            // 本月率(整体环比上升 1~3 个百分点)
            const thisMonth = Number((baseRate + 1.8 + (idx % 4 === 0 ? -0.5 : 1.2)).toFixed(1));
            return { lastMonth, thisMonth };
        }

        // 刷新退单页折线图(横坐标为地市,对比上月/本月)
        function refreshReturnLineChart() {
            const lineChart = chartInstances['return'] && chartInstances['return'].line;
            if (!lineChart) return;
            const lastData = cities.map(function(c) { return generateCityRateData(c).lastMonth; });
            const thisData = cities.map(function(c) { return generateCityRateData(c).thisMonth; });
            const allVals = lastData.concat(thisData);
            const minVal = Math.min.apply(null, allVals);
            const maxVal = Math.max.apply(null, allVals);
            const padding = Math.max(2, (maxVal - minVal) * 0.15);
            lineChart.setOption({
                yAxis: {
                    name: '退单率(%)',
                    nameTextStyle: {
                        fontSize: 11,
                        color: '#666666',
                        padding: [0, 0, 0, 10]
                    },
                    min: Math.max(0, Math.floor((minVal - padding) * 10) / 10),
                    max: Math.ceil((maxVal + padding) * 10) / 10
                },
                series: [
                    { name: '上月', data: lastData },
                    { name: '本月', data: thisData }
                ]
            });
        }

        // 退单页折线图横坐标固定为地市,下拉框仅触发重绘(数据不变)
        document.getElementById('city-select-return').addEventListener('change', function() {
            refreshReturnLineChart();
        });

        // 初始化默认页面(首次加载也走延迟 + resize,避免布局未完成导致事件不触发)
        function bootstrapDefaultPage() {
            const defaultPage = 'reject';
            const targetPage = document.getElementById(defaultPage + '-page');
            // 强制 reflow
            void targetPage.offsetHeight;
            setTimeout(function() {
                initCharts(defaultPage);
                setTimeout(function() {
                    if (chartInstances[defaultPage]) {
                        if (chartInstances[defaultPage].bar) chartInstances[defaultPage].bar.resize();
                        if (chartInstances[defaultPage].line) chartInstances[defaultPage].line.resize();
                    }
                }, 50);
            }, 50);
        }
        // 等 DOM + 布局就绪再初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bootstrapDefaultPage);
        } else {
            bootstrapDefaultPage();
        }
    </script>

    <!-- 自定义浮窗 -->
    <div id="customTooltip" class="custom-tooltip"></div>
</body>
